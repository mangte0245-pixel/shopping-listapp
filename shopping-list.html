<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #5a67d8; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child { border-bottom: none; }
    li:hover { background: #f7fafc; }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." />
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty">아직 아이템이 없습니다.</div>

    <button class="clear-btn" id="clearBtn">완료된 항목 지우기</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      list.innerHTML = '';
      const done = items.filter(i => i.checked).length;
      stats.textContent = items.length ? `${done} / ${items.length} 완료` : '';
      empty.style.display = items.length ? 'none' : 'block';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggle(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.title = '삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => remove(idx));

        li.append(checkbox, span, delBtn);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearDone);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
